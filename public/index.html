<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <style>
    :root {
      --color-primary: #4f46e5;
      --color-danger: #ef4444;
      --color-navy: #1e1b4b;
    }

    body {
      font-family: 'Kanit', sans-serif;
      background-color: #f8fafc;
      letter-spacing: -0.01em;
    }

    .panel {
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {

      }

      to {

        transform: translateY(0);
      }

    .badge {

      border-radius: 9999px;

      text-transform: uppercase;
    }

    input:focus,
    select:focus,

      outline: none;

      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;

    }

    ::-webkit-scrollbar-thumb:hover {

      height: 100%;

      display: flex;
      flex-direction: column;

      z-index: 9999;
    }

      margin: 0px;
      border: 4px solid rgba(255,255,255,0.05);

      border-radius: 50%;

    #global-loader h2,

    }

    @keyframes spin {
      0% { transform: rotate(0deg); }

    }

</head>

<body>

  <div id="global-loader">
    <div class="spinner mb-4"></div>
    <h2 class="text-lg font-medium text-slate-300">กำลังเปิดประตูเข้าสู่ระบบ Stroke Registry...</h2>
    <p class="text-xs text-slate-500 mt-1">กรุณารอสักครู่ ระบบกำลังซิงค์สัญญาณสเปรดชีตหลังบ้าน</p>
  </div>

  <div id="app-root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const { ResponsiveContainer, PieChart, Pie, Cell, Tooltip, Legend } = Recharts;

    const Icons = {
      Dashboard: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v10a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z" /></svg>,
      Form: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
      User: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
      Lock: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>,
      Plus: () => <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" /></svg>
    };

    // --- ฟังก์ชันการทำงานร่วมกับ Gemini API (อิงสถาปัตยกรรมแบบ Production ปลอดภัยสูง) ---
    const callGeminiAPI = async (prompt, systemInstruction, responseSchema, dynamicKey) => {
      // ตรวจสอบตัวตนของคีย์ก่อนเรียกใช้ระบบภายนอก
      const finalKey = dynamicKey || "";
      if (!finalKey) {
        throw new Error("ไม่พบสิทธิ์การใช้งานระบบประมวลผลสมองกล กรุณาติดต่อผู้ดูแลระบบเพื่อเปิดสิทธิ์การเข้าถึงหลังบ้าน");
      }
      
      const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=" + finalKey;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }]
      };
      
      if (systemInstruction) {
        payload.systemInstruction = { parts: [{ text: systemInstruction }] };
      }
      
      if (responseSchema) {
        payload.generationConfig = {
          responseMimeType: "application/json",
          responseSchema: responseSchema
        };
      }

      let delay = 1000;
      for (let i = 0; i < 5; i++) {
        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          
          if (!response.ok) {
            throw new Error("HTTP error! Status: " + response.status);
          }
          
          const result = await response.json();
          let text = "";
          if (result && result.candidates && result.candidates[0] && result.candidates[0].content && result.candidates[0].content.parts && result.candidates[0].content.parts[0]) {
            text = result.candidates[0].content.parts[0].text;
          }
          
          if (!text) throw new Error("API ผลลัพธ์กลับมาว่างเปล่า");
          return text;
        } catch (error) {
          if (i === 4) throw error;
          await new Promise(function(resolve) { setTimeout(resolve, delay); });
          delay *= 2;
        }
      }
    };

    const nurseNotesSchema = {
      type: "OBJECT",
      properties: {
        hn: { type: "STRING" },
        an: { type: "STRING" },
        patient_name: { type: "STRING" },
        age: { type: "STRING" },
        gender: { type: "STRING" }, 
        stroke_type: { type: "STRING" }, 
        ht: { type: "BOOLEAN" },
        dm: { type: "BOOLEAN" },
        dlp: { type: "BOOLEAN" },
        af: { type: "BOOLEAN" },
        rtpa: { type: "STRING" }, 
        nihss_adm: { type: "STRING" },
        nihss_dis: { type: "STRING" },
        discharge_status: { type: "STRING" }, 
        onset_datetime: { type: "STRING" }, 
        arrival_datetime: { type: "STRING" }, 
        needle_datetime: { type: "STRING" }, 
        recurrent_stroke: { type: "BOOLEAN" },
        aspiration_pneumonia: { type: "BOOLEAN" },
        uti: { type: "BOOLEAN" },
        bed_sore: { type: "BOOLEAN" },
        fall: { type: "BOOLEAN" },
        hemorrhage: { type: "BOOLEAN" },
        iicp: { type: "BOOLEAN" },
        sepsis: { type: "BOOLEAN" },
        dvt: { type: "BOOLEAN" }
      }
    };

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [currentUser, setCurrentUser] = useState({ name: "เจ้าหน้าที่ประมวลผล", role: "User" });
      const [currentTab, setCurrentTab] = useState("dashboard");
      
      const [patients, setPatients] = useState([]);
      const [monthlyStats, setMonthlyStats] = useState([]);
      const [loading, setLoading] = useState(false);
      const [showModal, setShowModal] = useState(false);
      const [jsonInput, setJsonInput] = useState("");

      // --- ตัวแปรสำหรับ Production Security ---
      const [backendGeminiKey, setBackendGeminiKey] = useState("");

      // --- ฟังก์ชัน AI States ---
      const [nursingNoteText, setNursingNoteText] = useState("");
      const [isParsingNote, setIsParsingNote] = useState(false);
      const [activeFormTab, setActiveFormTab] = useState("manual"); 
      
      const [insightPatient, setInsightPatient] = useState(null);
      const [insightResult, setInsightResult] = useState("");
      const [isGeneratingInsight, setIsGeneratingInsight] = useState(false);

      const [chatOpen, setChatOpen] = useState(false);
      const [chatMessages, setChatMessages] = useState([
        { role: "assistant", content: "สวัสดีค่ะแพทย์และทีมพยาบาลประจำวอร์ด ยินดีต้อนรับสู่ระบบผู้ช่วยพยาบาล AI คลินิกคู่ใจ! คุณสามารถถามคำถามทางการแพทย์ แนวปฏิบัติโรคสมอง หรือสั่งให้ฉันร่างประวัติสรุปอาการ และ refer email จากข้อมูลสถิติคนไข้ปัจจุบันในวอร์ดได้เลยนะคะ ✨" }
      ]);
      const [chatInput, setChatInput] = useState("");
      const [isChatSending, setIsChatSending] = useState(false);
      const chatEndRef = useRef(null);

      const defaultForm = {
        hn: "", an: "", patient_name: "", age: "", gender: "ชาย", stroke_type: "Ischemic",
        ht: false, dm: false, dlp: false, af: false,
        rtpa: "ไม่ได้รับ",
        nihss_adm: "", nihss_dis: "", discharge_status: "Improved",
        onset_datetime: "", arrival_datetime: "", needle_datetime: "",
        recurrent_stroke: false, aspiration_pneumonia: false, uti: false,
        bed_sore: false, fall: false, hemorrhage: false, iicp: false, sepsis: false, dvt: false
      };
      const [formData, setFormData] = useState(defaultForm);

      useEffect(() => {
        const mainLoader = document.getElementById('global-loader');
        if(mainLoader) mainLoader.style.display = 'none';
        if (isAuthenticated) {
          fetchCloudData();
          fetchBackendProperties();
        }
      }, [isAuthenticated]);

      useEffect(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [chatMessages, chatOpen]);

      // ดึงคีย์ลับทางอ้อมจากระบบเซิร์ฟเวอร์หลังบ้าน ป้องกันคีย์หลุด
      const fetchBackendProperties = () => {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((key) => {
              if (key) setBackendGeminiKey(key);
            })
            .getGeminiApiKeySecurely();
        } else {
          setBackendGeminiKey("SANDBOX_MOCK_KEY"); // โหมดทดสอบหน้าเว็บโลคอล
        }
      };

      const fetchCloudData = () => {
        setLoading(true);
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((response) => {
              setLoading(false);
              if (response.status === "success") {
                setPatients(response.data || []);
                setMonthlyStats(response.monthlyStats || []);
              } else {
                Swal.fire("ข้อผิดพลาด", response.message, "error");
              }
            })
            .withFailureHandler((err) => {
              setLoading(false);
              Swal.fire("ดึงข้อมูลล้มเหลว", err.toString(), "error");
            })
            .getRegistryData();
        } else {
          setLoading(false);
          setPatients([
            { "ID บันทึก": "REC-001", "HN": "45689", "ชื่อ-นามสกุล": "สมชาย มีสติ", "อายุ": 65, "เพศ": "ชาย", "ประเภท Stroke": "Ischemic", "ได้รับยา rt-PA": "ได้รับ", "NIHSS แรกรับ": 14, "NIHSS ก่อนจำหน่าย": 3, "สถานะการจำหน่าย": "Improved", "โรคประจำตัว": "HT, DM, DLP", "Recurrent Stroke": false, "Aspiration Pneumonia": true, "วันเวลาเริ่มมีอาการ": "2026-05-17T12:30", "วันเวลามาถึงโรงพยาบาล": "2026-05-17T13:45", "วันเวลาที่ได้รับยา": "2026-05-17T14:30" },
            { "ID บันทึก": "REC-002", "HN": "12345", "ชื่อ-นามสกุล": "สายใจ แข็งแรง", "อายุ": 70, "เพศ": "หญิง", "ประเภท Stroke": "Hemorrhagic", "ได้รับยา rt-PA": "ไม่ได้รับ", "NIHSS แรกรับ": 20, "NIHSS ก่อนจำหน่าย": 18, "สถานะการจำหน่าย": "Stable", "โรคประจำตัว": "HT", "Recurrent Stroke": false, "Aspiration Pneumonia": false, "วันเวลาเริ่มมีอาการ": "2026-05-16T08:00", "วันเวลามาถึงโรงพยาบาล": "2026-05-16T09:15" }
          ]);
          setMonthlyStats([{ month: "พ.ค. 69", total_cases: 2, ischemic_count: 1, hemorrhagic_count: 1, tia_count: 0, avg_door_to_needle_mins: 45 }]);
        }
      };

      const handleLogin = (e) => {
        e.preventDefault();
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((response) => {
              if (response.status === "success") {
                setCurrentUser({ name: response.user || username, role: response.role || "User" });
                setIsAuthenticated(true);
              } else {
                Swal.fire("เข้าระบบไม่สำเร็จ", response.message, "error");
              }
            })
            .loginUser(username, password);
        } else {
          if (username === "nurse01" && password === "123456") {
            setCurrentUser({ name: "พยาบาล (Sandbox)", role: "Admin" });
            setIsAuthenticated(true);
          } else {
            Swal.fire("คำเตือน", "กรอกรหัสทดสอบ nurse01 / 123456", "warning");
          }
        }
      };

      const handleFormSubmit = (e) => {
        e.preventDefault();
        if (!formData.hn || !formData.patient_name) {
          Swal.fire("ข้อมูลไม่ครบ", "กรุณากรอก HN และชื่อคนไข้ให้ครบถ้วน", "warning");
          return;
        }

        setLoading(true);
        let underlying = [];
        if(formData.ht) underlying.push("HT");
        if(formData.dm) underlying.push("DM");
        if(formData.dlp) underlying.push("DLP");
        if(formData.af) underlying.push("AF");
        
        const payload = {
          "HN": formData.hn,
          "AN": formData.an,
          "ชื่อ-นามสกุล": formData.patient_name,
          "อายุ": formData.age ? Number(formData.age) : "",
          "เพศ": formData.gender,
          "ประเภท Stroke": formData.stroke_type,
          "โรคประจำตัว": underlying.join(", "),
          "ได้รับยา rt-PA": formData.rtpa,
          "NIHSS แรกรับ": formData.nihss_adm ? Number(formData.nihss_adm) : "",
          "NIHSS ก่อนจำหน่าย": formData.nihss_dis ? Number(formData.nihss_dis) : "",
          "สถานะการจำหน่าย": formData.discharge_status,
          "วันเวลาเริ่มมีอาการ": formData.onset_datetime,
          "วันเวลามาถึงโรงพยาบาล": formData.arrival_datetime,
          "วันเวลาที่ได้รับยา": formData.needle_datetime,
          "Recurrent Stroke": formData.recurrent_stroke,
          "Aspiration Pneumonia": formData.aspiration_pneumonia,
          "UTI": formData.uti,
          "Bed Sore": formData.bed_sore,
          "Fall": formData.fall,
          "Hemorrhage": formData.hemorrhage,
          "IICP": formData.iicp,
          "Sepsis": formData.sepsis,
          "DVT": formData.dvt
        };

        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((response) => {
              setLoading(false);
              if (response.status === "success") {
                Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', timer: 1500, showConfirmButton: false });
                setShowModal(false);
                setFormData(defaultForm);
                setNursingNoteText("");
                fetchCloudData();
              } else {
                Swal.fire("ผิดพลาด", response.message, "error");
              }
            })
            .savePatientsWithDynamicMapping([payload], currentUser.name);
        } else {
          setLoading(false);
          setShowModal(false);
          setPatients(prev => [payload, ...prev]);
          Swal.fire("สำเร็จ", "จำลองการบันทึกข้อมูลเรียบร้อย", "success");
        }
      };

      const handleAIParseNursingNotes = async () => {
        if (!nursingNoteText.trim()) {
          Swal.fire("ข้อมูลบันทึกพยาบาลว่างเปล่า", "กรุณาระบุหรือแปะข้อความบันทึกก่อนวิเคราะห์ค่ะ", "warning");
          return;
        }

        setIsParsingNote(true);
        try {
          const sysPrompt = "คุณคือพยาบาลผู้เชี่ยวชาญการถอดบันทึกคลินิก (Clinical NLP parser) ของหอผู้ป่วยหลอดเลือดสมอง ประเทศไทย หน้าที่ของคุณคือสกัดเนื้อความดิบที่พยาบาลพิมพ์ส่งเวร แล้วดึงประเด็นข้อมูลสำคัญมาจัดลงฟิลด์ JSON ตามรูปแบบ Schema ที่ระบุอย่างถูกต้องที่สุด ห้ามเดาข้อมูลเกินความจริง หากจุดใดไม่มีการระบุให้ตอบเป็นค่าว่างหรือ false";
          const parsedStr = await callGeminiAPI(nursingNoteText, sysPrompt, nurseNotesSchema, backendGeminiKey);
          const parsedObj = JSON.parse(parsedStr);

          setFormData({
            hn: parsedObj.hn || "",
            an: parsedObj.an || "",
            patient_name: parsedObj.patient_name || "",
            age: parsedObj.age || "",
            gender: parsedObj.gender || "ชาย",
            stroke_type: parsedObj.stroke_type || "Ischemic",
            ht: !!parsedObj.ht,
            dm: !!parsedObj.dm,
            dlp: !!parsedObj.dlp,
            af: !!parsedObj.af,
            rtpa: parsedObj.rtpa || "ไม่ได้รับ",
            nihss_adm: parsedObj.nihss_adm || "",
            nihss_dis: parsedObj.nihss_dis || "",
            discharge_status: parsedObj.discharge_status || "Improved",
            onset_datetime: parsedObj.onset_datetime || "",
            arrival_datetime: parsedObj.arrival_datetime || "",
            needle_datetime: parsedObj.needle_datetime || "",
            recurrent_stroke: !!parsedObj.recurrent_stroke,
            aspiration_pneumonia: !!parsedObj.aspiration_pneumonia,
            uti: !!parsedObj.uti,
            bed_sore: !!parsedObj.bed_sore,
            fall: !!parsedObj.fall,
            hemorrhage: !!parsedObj.hemorrhage,
            iicp: !!parsedObj.iicp,
            sepsis: !!parsedObj.sepsis,
            dvt: !!parsedObj.dvt
          });

          Swal.fire({
            icon: 'success',
            title: 'วิเคราะห์บันทึกเสร็จสมบูรณ์! ✨',
            text: 'ระบบแมปอาการแรกรับ ยาที่ได้รับ และตัวบ่งชี้ภาวะแทรกซ้อนลงช่องแบบฟอร์มให้เรียบร้อยแล้ว กรุณาไปตรวจสอบข้อมูลความถูกต้องที่แท็บระบุเองได้เลยค่ะ',
            confirmButtonText: 'ตกลง'
          });
          setActiveFormTab("manual");
        } catch (error) {
          Swal.fire("ไม่สามารถแปลงข้อมูลได้", error.message, "error");
        } finally {
          setIsParsingNote(false);
        }
      };

      const handleTriggerClinicalInsight = async (patient) => {
        setInsightPatient(patient);
        setIsGeneratingInsight(true);
        setInsightResult("");

        try {

          const patientDetailStr = "ประวัติคนไข้: \n" +

              patient["Aspiration Pneumonia"] ? "ปอดอักเสบจากการสำลัก" : "",
              patient["UTI"] ? "การติดเชื้อในระบบปัสสาวะ" : "",

              patient["Fall"] ? "ตกเตียงพลัดตก" : "",
              patient["Hemorrhage"] ? "มีเลือดออกผิดปกติ" : "",

              patient["DVT"] ? "ลิ่มเลือดอุดตันในหลอดเลือดดำลึก" : ""
            ].filter(Boolean).join(", ");

          const response = await callGeminiAPI(patientDetailStr, sysPrompt, null, backendGeminiKey);

      const handleSendCopilotChat = async (e) => {

          const chatPrompt = statsContext + "\n\nประวัติการคุยที่ผ่านมา:\n" +

            "\n\nผู้ใช้ถาม: " + userText + "\nAI:";

          const reply = await callGeminiAPI(chatPrompt, systemPrompt, null, backendGeminiKey);
          setChatMessages(prev => [...prev, { role: "assistant", content: reply }]);
        } catch (error) {
          setChatMessages(prev => [...prev, { role: "assistant", content: "ขออภัยด้วยค่ะ ระบบขัดข้องชั่วคราว: " + error.message }]);
        } finally {
          setIsChatSending(false);
        }
      };

      const parseSimpleMarkdown = (text) => {
        if (!text) return "";
        let escapedText = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
        
        escapedText = escapedText.replace(/\*\*(.*?)\*\"/g, "<strong>$1</strong>");
        escapedText = escapedText.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
        escapedText = escapedText.replace(/^### (.*?)$/gm, "<h4 class='text-sm font-bold text-slate-800 mt-4 mb-1'>$1</h4>");
        escapedText = escapedText.replace(/^## (.*?)$/gm, "<h3 class='text-base font-bold text-slate-900 mt-5 mb-2 border-b pb-1'>$1</h3>");
        escapedText = escapedText.replace(/^# (.*?)$/gm, "<h2 class='text-lg font-bold text-indigo-700 mt-6 mb-3'>$1</h2>");
        escapedText = escapedText.replace(/^\s*-\s+(.*?)$/gm, "<li class='list-disc ml-5 text-xs text-slate-600 my-1'>$1</li>");
        escapedText = escapedText.replace(/^\s*\*\s+(.*?)$/gm, "<li class='list-disc ml-5 text-xs text-slate-600 my-1'>$1</li>");
        escapedText = escapedText.replace(/\n/g, "<br />");
        return escapedText;

                  {chatMessages.map((msg, index) => (
                    <div key={index} className={`flex ${msg.role === "user" ? "justify-end" : "justify-start"}`}>
                      <div className={`max-w-[85%] rounded-xl px-3 py-2 text-xs ${msg.role === "user" ? "bg-indigo-600 text-white" : "bg-[#1b254b] border border-slate-800 text-slate-200"}`}>
                        <div dangerouslySetInnerHTML={{ __html: parseSimpleMarkdown(msg.content) }} />
                      </div>
                    </div>
                  ))}
                  {isChatSending && (
                    <div className="flex justify-start">
                      <div className="bg-[#1b254b] border border-slate-800 text-slate-400 rounded-xl px-3 py-2 text-xs">กำลังคำนวณข้อมูลคลินิกและสถิติวอร์ด...</div>
                    </div>
                  )}
                  <div ref={chatEndRef} />
                </div>

                <form onSubmit={handleSendCopilotChat} className="p-3 bg-[#131d45] border-t border-slate-800 flex gap-2">
                  <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder="ถามคำถามคลินิกโรคสมอง..." className="flex-1 bg-[#1b254b] text-xs px-3 py-2 text-white border border-slate-700/60 rounded-xl focus:outline-none" />
                  <button type="submit" disabled={isChatSending} className="bg-indigo-600 text-white text-xs px-4 rounded-xl">ส่ง</button>
                </form>
              </div>
            ) : null}

            <button onClick={() => setChatOpen(!chatOpen)} className="w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-2xl">
              <span className="text-xl">✨</span>
            </button>
          </div>

        </div>
      );
    }

    const rootElement = document.getElementById('app-root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>

</html>
